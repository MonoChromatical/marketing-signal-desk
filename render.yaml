services:
  - type: web
    name: signal-desk
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_API_KEY
        sync: false